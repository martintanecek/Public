<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 880" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <!-- backdrop -->
  <rect x="0" y="0" width="620" height="880" rx="18" fill="#0e0e10"/>
  <rect x="24" y="24" width="572" height="832" rx="16" fill="#161618" stroke="#2a2a2e" stroke-width="1"/>

  <!-- header -->
  <text x="48" y="66" fill="#e7e7ea" font-size="20" font-weight="600">Battery status</text>
  <text x="572" y="66" fill="#6b7280" font-size="13" text-anchor="end">EV Charging</text>

  <!-- gauge card -->
  <rect x="48" y="86" width="524" height="230" rx="12" fill="#1d1d20"/>
  <!-- gauge arcs (cx=310 cy=250 r=115) -->
  <g fill="none" stroke-width="20" stroke-linecap="round">
    <path d="M195 250 A115 115 0 0 1 217 182.4" stroke="#ef4444"/>
    <path d="M217 182.4 A115 115 0 0 1 403 182.4" stroke="#22c55e"/>
    <path d="M403 182.4 A115 115 0 0 1 425 250" stroke="#eab308"/>
  </g>
  <!-- needle to 80% -->
  <line x1="310" y1="250" x2="381" y2="198" stroke="#e7e7ea" stroke-width="4" stroke-linecap="round"/>
  <circle cx="310" cy="250" r="7" fill="#e7e7ea"/>
  <text x="310" y="228" fill="#f3f4f6" font-size="46" font-weight="700" text-anchor="middle">80 %</text>
  <text x="310" y="292" fill="#9ca3af" font-size="14" text-anchor="middle">Estimated SOC</text>

  <!-- range + current SOC -->
  <rect x="48" y="328" width="524" height="80" rx="12" fill="#1d1d20"/>
  <circle cx="74" cy="356" r="4" fill="#3b82f6"/>
  <text x="92" y="361" fill="#d1d5db" font-size="15">Range</text>
  <text x="548" y="361" fill="#f3f4f6" font-size="15" font-weight="600" text-anchor="end">172 km</text>
  <text x="92" y="392" fill="#d1d5db" font-size="15">Current SOC (enter)</text>
  <line x1="330" y1="392" x2="500" y2="392" stroke="#3a3a40" stroke-width="4" stroke-linecap="round"/>
  <line x1="330" y1="392" x2="466" y2="392" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <circle cx="466" cy="392" r="7" fill="#3b82f6"/>
  <text x="548" y="397" fill="#f3f4f6" font-size="15" font-weight="600" text-anchor="end">80 %</text>

  <!-- Quick charge tile -->
  <rect x="48" y="420" width="524" height="60" rx="12" fill="#242429" stroke="#333338" stroke-width="1"/>
  <polygon points="78,438 68,456 76,456 72,464 86,444 78,444" fill="#f59e0b"/>
  <text x="310" y="456" fill="#f3f4f6" font-size="16" font-weight="600" text-anchor="middle">Charge now to 80 %</text>

  <!-- departure time -->
  <rect x="48" y="492" width="524" height="56" rx="12" fill="#1d1d20"/>
  <circle cx="74" cy="520" r="9" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <line x1="74" y1="520" x2="74" y2="514" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="74" y1="520" x2="79" y2="522" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <text x="94" y="525" fill="#d1d5db" font-size="15">Departure time</text>
  <rect x="470" y="504" width="86" height="32" rx="6" fill="#2a2a30"/>
  <text x="513" y="525" fill="#f3f4f6" font-size="15" font-weight="600" text-anchor="middle">05 : 00</text>

  <!-- Charge to 100% by departure tile -->
  <rect x="48" y="560" width="524" height="60" rx="12" fill="#242429" stroke="#333338" stroke-width="1"/>
  <circle cx="76" cy="590" r="10" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <line x1="76" y1="590" x2="76" y2="583" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="590" x2="81" y2="592" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
  <text x="310" y="595" fill="#f3f4f6" font-size="16" font-weight="600" text-anchor="middle">Charge to 100 % by departure</text>

  <!-- Manual tile -->
  <rect x="48" y="632" width="524" height="60" rx="12" fill="#242429" stroke="#333338" stroke-width="1"/>
  <text x="70" y="668" font-size="18" text-anchor="middle">✋</text>
  <text x="310" y="668" fill="#f3f4f6" font-size="16" font-weight="600" text-anchor="middle">Manual charging</text>

  <!-- Detail -->
  <rect x="48" y="704" width="524" height="128" rx="12" fill="#1d1d20"/>
  <text x="70" y="732" fill="#9ca3af" font-size="13" font-weight="600" letter-spacing="0.5">DETAIL</text>
  <g font-size="14">
    <text x="70" y="760" fill="#d1d5db">Current power</text>
    <text x="548" y="760" fill="#f3f4f6" font-weight="600" text-anchor="end">2 120 W</text>
    <text x="70" y="786" fill="#d1d5db">Delivered</text>
    <text x="548" y="786" fill="#f3f4f6" font-weight="600" text-anchor="end">8.8 kWh</text>
    <text x="70" y="812" fill="#d1d5db">Done at 100 %</text>
    <text x="548" y="812" fill="#f3f4f6" font-weight="600" text-anchor="end">03:01</text>
  </g>
</svg>
